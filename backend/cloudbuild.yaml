################################################################################
# TitlePerfect — Cloud Build pipeline
# GCP project: titleperfect-e3a1c | Service: titleperfect-api
# Trigger: push to main (configure in Cloud Build console)
#
# Prerequisites (one-time setup — see deploy/DEPLOY.md):
#   - Secret Manager secrets: anthropic-api-key, firebase-service-account, stripe-secret-key
#   - Cloud Run service account needs secretAccessor role on all 3 secrets
#   - Domain mapping for api.titleperfect.app
#
# To create stripe-secret-key in Secret Manager (one-time):
#   echo -n "sk_test_..." | gcloud secrets create stripe-secret-key --data-file=- --replication-policy=automatic
#   gcloud secrets add-iam-policy-binding stripe-secret-key \
#     --member="serviceAccount:$(gcloud projects describe titleperfect-e3a1c --format='value(projectNumber)')-compute@developer.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
################################################################################

steps:
  # ── 1. Build container image ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:$COMMIT_SHA'
      - '--tag'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:latest'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:latest'
      - '.'
    dir: 'backend'

  # ── 2. Push to Artifact Registry ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api'

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'titleperfect-api'
      - '--project'
      - 'titleperfect-e3a1c'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '80'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'     # 5 min — covers worst-case analysis (~90s) + retries
      - '--allow-unauthenticated'
      # Plain env vars (non-sensitive)
      - '--set-env-vars'
      - 'ENVIRONMENT=production,FRONTEND_URL=${_FRONTEND_URL},CHROME_EXTENSION_ID=${_CHROME_EXTENSION_ID},GCP_PROJECT_ID=titleperfect-e3a1c,GCP_REGION=${_REGION},LOG_LEVEL=INFO,GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/firebase.json,STRIPE_OWNER_MONTHLY_PRICE_ID=${_STRIPE_OWNER_MONTHLY_PRICE_ID},STRIPE_OWNER_ANNUAL_PRICE_ID=${_STRIPE_OWNER_ANNUAL_PRICE_ID},STRIPE_CONSULTANT_MONTHLY_PRICE_ID=${_STRIPE_CONSULTANT_MONTHLY_PRICE_ID},STRIPE_CONSULTANT_ANNUAL_PRICE_ID=${_STRIPE_CONSULTANT_ANNUAL_PRICE_ID}'
      # Secrets via Secret Manager
      # ANTHROPIC_API_KEY → injected as env var from secret
      # STRIPE_SECRET_KEY → injected as env var from secret
      # firebase-service-account → mounted as file at /run/secrets/firebase.json
      - '--set-secrets'
      - 'ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,/run/secrets/firebase.json=firebase-service-account:latest'

substitutions:
  _REGION: us-central1
  _FRONTEND_URL: https://titleperfect.app
  _CHROME_EXTENSION_ID: ''   # Set in Cloud Build trigger substitutions once extension is published
  # Stripe price IDs — set in Cloud Build trigger substitutions (Stripe test dashboard)
  _STRIPE_OWNER_MONTHLY_PRICE_ID: 'price_1T5rhkD0k6gutq2Q0UaYqAO0'
  _STRIPE_OWNER_ANNUAL_PRICE_ID: 'price_1T5rhkD0k6gutq2QjRREuzEW'
  _STRIPE_CONSULTANT_MONTHLY_PRICE_ID: 'price_1T5sLAD0k6gutq2Qm2RpY227'
  _STRIPE_CONSULTANT_ANNUAL_PRICE_ID: 'price_1T5sMiD0k6gutq2QzzXvV3kF'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/titleperfect/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # Faster builds

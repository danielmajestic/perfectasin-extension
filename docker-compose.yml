version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=8000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped
